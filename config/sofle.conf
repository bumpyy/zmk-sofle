# Uncomment the following line to enable the Sofle OLED Display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_POINTING=y
# CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Custom display config

# central
# CONFIG_NICE_OLED_WIDGET_WPM_LUNA=y

# # peripheral
# CONFIG_NICE_OLED_ON=n
# CONFIG_NICE_EPAPER_ON=y
# CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SMART_BATTERY=n
# CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_WPM=n
# CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL=y
# CONFIG_NICE_OLED_WIDGET_STATIC_IMAGE_PERIPHERAL=n
# CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_GEM=n
# CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CAT=n
# CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_HEAD=n
# CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_POKEMON=n
# CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_SPACEMAN=n
# CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_MS
# CONFIG_NICE_OLED_WIDGET_STATIC_IMAGE_PERIPHERAL_VIM
# CONFIG_NICE_OLED_WIDGET_STATIC_IMAGE_PERIPHERAL_VIP_MARCOS
# CONFIG_NICE_OLED_WIDGET_PERIPHERAL

# Custom display config end

# Uncomment these two lines to add support for encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment this line below to add rgb underglow / backlight support
# CONFIG_ZMK_RGB_UNDERGLOW=y

# Uncomment the line below to disable external power toggling by the underglow.
# By default toggling the underglow on and off also toggles external power
# on and off. This also causes the display to turn off.
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_IDLE_TIMEOUT=180000
CONFIG_ZMK_SLEEP=n
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

CONFIG_ZMK_STUDIO=y
